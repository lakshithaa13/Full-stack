<html lang="en">
<head>

    <title>Document</title>
    <style>
        body{
            height:100vh;
        }
        .navbar{
            position:sticky;
            top:0;
            background-color: rgb(0, 0, 0);
        }
        .relative{
            border:2px solid rgb(206, 5, 5);
            position:relative;
            height: 150px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
                <li>Service</li>
            </ul>
        </nav>
    </div>
    <div class="relative">
        <h1>relative</h1>
        <div class="absolute">
            <h1>absolute</h1>   
        </div>
    </div>
    <div class="fixed">Fixed</div>
        <h1>fixed</h1>
</body>
</html>
