<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 80px 200px 50px;
        }
        .header{
            background-color: rgb(75, 166, 219);
            grid-column-start: 1 ;
            grid-column-end: 3;
        }
        .sidebar{
            background-color: rgb(20, 221, 127);
        }
        .content{
            background-color: rgb(221, 20, 20);
        }
    
        .footer{
            background-color: rgb(12, 12, 136);
            grid-column-start: 1 ;
            grid-column-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
       <header class="header"></header>
       <aside class="sidebar"></aside>
       <main class="content"></main>
       <footer class="footer"></footer>
       </div>
</body>
</html>
